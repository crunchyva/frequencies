const BLOCKED_KEY = 'frequencies.blocked.v1';
const YEARS_KEY = 'frequencies.excludedYears.v1';
let wantFilters = new Set();
let avoidFilters = new Set();
let history = [];
let queued = null;
let current = null;
let failedThisSession = new Set();
let blocked = new Set(JSON.parse(localStorage.getItem(BLOCKED_KEY) || '[]'));

let changeToken = 0;

let activeBucket = null;

const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

function cleanDisplayTitle(title) {
  return String(title || '')
    .replace(/\s+(lots of|a few|ish)\s*$/i, '')
    .replace(/\s{2,}/g, ' ')
    .trim();
}
for (const item of LIBRARY) item.title = cleanDisplayTitle(item.title);
const ALL_YEARS = [...new Set(LIBRARY.map(item => item.year).filter(Boolean))].sort((a,b) => b - a);

function normalize(s) { return String(s || '').toLowerCase(); }
function haystack(item) { return normalize([item.title, item.audience, ...(item.tags || [])].join(' ')); }
function itemTags(item) { return (item.tags || []).map(tag => normalize(tag).trim()); }
function filterMatches(item, filter) {
  const tags = itemTags(item);
  if (filter.exactTags && filter.exactTags.some(term => tags.includes(normalize(term)))) return true;
  const h = haystack(item);
  return (filter.terms || []).some(term => h.includes(normalize(term)));
}
function itemRole(item) {
  const tags = itemTags(item);
  const tagText = tags.join(' | ');
  const hasMdom = /\bmdom\b/.test(tagText);
  const hasMsub = /\bmsub\b/.test(tagText);
  const explicitSwitch = tags.some(tag => tag === 'switch' || tag === 'switchy');
  if (explicitSwitch || (hasMdom && hasMsub)) return 'switch';
  if (hasMsub) return 'msub';
  if (hasMdom) return 'mdom';
  return null;
}
function hasRoleTag(item, role) {
  return new RegExp(`\\b${role}\\b`, 'i').test(itemTags(item).join(' | '));
}
function hardRoleMatches(item, role) {
  if (!role) return true;
  return itemRole(item) === role;
}
function isSfw(item) {
  const tagText = normalize([item.title, ...(item.tags || [])].join(' | '));
  return /(^|\b)sfw($|\b)/i.test(tagText);
}
function contentMatches(item) {
  if (contentPreference === 'sfw') return isSfw(item);
  if (contentPreference === 'nsfw') return !isSfw(item);
  return true;
}
function wantObjects() { return FILTERS.filter(f => wantFilters.has(f.id)); }
function avoidObjects() { return FILTERS.filter(f => avoidFilters.has(f.id)); }
function wantCount(item) { return wantObjects().filter(f => filterMatches(item, f)).length; }
function avoided(item) { return avoidObjects().some(f => filterMatches(item, f)); }
function saveBlocked() { localStorage.setItem(BLOCKED_KEY, JSON.stringify([...blocked])); }
function saveYears() { localStorage.setItem(YEARS_KEY, JSON.stringify([...excludedYears])); }
function yearMatches(item) { return !item.year || !excludedYears.has(String(item.year)); }

const AUDIO_BUCKETS = [
  ['tender', [['comfort', 2], ['aftercare', 2], ['cuddle', 2], ['soft', 1], ['gentle', 1], ['sweet', 1], ['cosy', 2], ['reassur', 2], ['sleepy', 3]]],
  ['romantic', [['bfe', 3], ['domestic', 3], ['friends to lover', 3], ['kissing', 1], ['kisses', 1], ['sweetheart', 2], ['romantic', 3], ['affection', 2]]],
  ['teasing', [['teasing', 3], ['tease', 3], ['denial', 3], ['edging', 3], ['reluctance', 2]]],
  ['mdom', [['mdom', 3], ['good girl', 2], ['possessive', 3], ['manhandling', 3], ['guiding', 2], ['pinning', 3], ['you’re mine', 2], ["you're mine", 2]]],
  ['msub', [['msub', 4], ['whimper', 3], ['whine', 3], ['begging', 3], ['good boy', 3], ['needy', 2], ['please', 1]]],
  ['oral', [['cunnilingus', 4], ['blowjob', 4], ['oral', 3], ['facesitting', 4], ['face sitting', 4]]],
  ['grinding', [['grinding', 4], ['outercourse', 4], ['riding', 3], ['thigh', 3]]],
  ['breeding', [['creampie', 3], ['breeding', 4], ['unprotected', 3], ['cum inside', 4]]],
  ['ramblefap', [['ramblefap', 100]]],
  ['playful', [['silly', 4], ['laugh', 2], ['catboy', 4], ['ramble', 4], ['playful', 3], ['purr', 3], ['meow', 3]]],
  ['whispered', [['whisper', 4], ['binaural', 4], ['soft spoken', 4]]],
  ['multilingual', [['danish', 4], ['spanish', 4], ['bilingual', 4], ['trilingual', 4]]],
  ['risky', [['public', 4], ['semi-public', 4], ['interrupted', 3], ['bad idea', 4]]]
];

function bucketFor(item) {
  const role = itemRole(item);
  if (role === 'mdom' || role === 'msub') return role;
  const tags = itemTags(item);
  let bestBucket = AUDIO_BUCKETS[0][0];
  let bestScore = -1;
  for (const [bucket, signals] of AUDIO_BUCKETS) {
    if (bucket === 'mdom' || bucket === 'msub') continue;
    const score = signals.reduce((sum, [term, weight]) => {
      return sum + tags.filter(tag => tag.includes(normalize(term))).length * weight;
    }, 0);
    if (score > bestScore) {
      bestBucket = bucket;
      bestScore = score;
    }
  }
  return bestBucket;
}

const BUCKET_BY_ID = new Map(LIBRARY.map(item => [item.id, bucketFor(item)]));
const FIXED_QUICK_BUCKETS = ['mdom', 'msub'];
const RANDOM_QUICK_BUCKETS = AUDIO_BUCKETS
  .map(([label]) => label)
  .filter(label => !FIXED_QUICK_BUCKETS.includes(label))
  .sort(() => Math.random() - 0.5)
  .slice(0, 6);
const QUICK_BUCKETS = [...FIXED_QUICK_BUCKETS, ...RANDOM_QUICK_BUCKETS];

function renderQuickChips() {
  const wrap = $('#quickChips');
  wrap.innerHTML = '';
  for (const label of QUICK_BUCKETS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'quickChip';
    btn.textContent = label;
    btn.addEventListener('click', () => {
      activeBucket = label === 'mdom' || label === 'msub' ? null : label;
      roleRequirement = label === 'mdom' || label === 'msub' ? label : null;
      landingWeighted = true;
      releaseWord(label, btn);
      openRadio();

    wrap.appendChild(btn);
  }
}

function releaseWord(word, source) {
    const rect = source.getBoundingClientRect();
    const particle = document.createElement('span');
    particle.className = 'particle';
    particle.textContent = word;
    particle.style.left = `${rect.left + rect.width / 2}px`;
    particle.style.top = `${rect.top + rect.height / 2}px`;
    particle.style.setProperty('--drift-x', '0px');
    particle.style.setProperty('--drift-y', '-92px');
    $('#particles').appendChild(particle);
    particle.addEventListener('animationend', () => particle.remove());
}

let lastChoiceWasReplay = false;

function heardIds() {
  return new Set(history.map(h => h.id));
}

function baseCandidates({ignoreHistory=false} = {}) {
  let pool = LIBRARY.filter(item => !blocked.has(item.id) && !failedThisSession.has(item.id));
  pool = pool.filter(item => contentMatches(item));
  pool = pool.filter(item => yearMatches(item));
  if (activeBucket) pool = pool.filter(item => BUCKET_BY_ID.get(item.id) === activeBucket);
  if (avoidFilters.size) pool = pool.filter(item => !avoided(item));
  if (!ignoreHistory) {
    const played = heardIds();
    pool = pool.filter(item => !played.has(item.id));
  }
  return pool;
}

function preferredRole() {
  if (roleRequirement) return roleRequirement;
  if (wantFilters.has('msub')) return 'msub';
  if (wantFilters.has('mdom')) return 'mdom';
  return null;
}

function prioritizeRole(pool) {
  const role = preferredRole();
  if (!role) return pool;
  if (role === 'msub') {
    const nonMdom = pool.filter(item => !hasRoleTag(item, 'mdom'));
    const explicitMsub = nonMdom.filter(item => itemRole(item) === 'msub');
    return explicitMsub.length ? explicitMsub : (nonMdom.length ? nonMdom : pool);
  }
  const matching = pool.filter(item => hardRoleMatches(item, role));
  return matching.length ? matching : pool;
}

function roleAffinityWeight(item, role) {
  if (!role) return 1;
  const tags = itemTags(item);
  const signals = role === 'msub' ? [
    ['msub', 8], ['good boy', 5], ['all yours', 4], ['whimper', 3], ['whine', 3],
    ['begging', 3], ['pleading', 3], ['nervous', 2], ['shy', 2], ['please', 1]
  ] : role === 'mdom' ? [
    ['mdom', 8], ['gentle mdom', 5], ['good girl', 4], ['possessive', 3],
    ['manhandling', 3], ['pinning', 3], ['guiding', 2], ['call me sir', 3]
  ] : [['switch', 8], ['switchy', 8]];
  const score = signals.reduce((sum, [term, weight]) => {
    return sum + (tags.some(tag => tag.includes(term)) ? weight : 0);
  }, 0);
  return 1 + score * 1.5;
}

function score(item) {
  let s = 0;
  s += wantCount(item) * 100;
  s += Math.log10((item.plays || 1) + 10) * 2;
  s += Math.max(0, 200 - (item.position || 200)) / 10;
  if ((current && item.id === current.id) || (queued && item.id === queued.id)) s -= 999999;
  return s;
}

function weightedPick(weighted) {
  const total = weighted.reduce((sum, [, weight]) => sum + weight, 0);
  let roll = Math.random() * total;
  for (const [item, weight] of weighted) {
    roll -= weight;
    if (roll <= 0) return item;
  }
  return weighted.length ? weighted[weighted.length - 1][0] : null;
}

function selectionBaseWeight(item) {
  const plays = Math.max(1, Number(item.plays) || 1);
  const timestamp = item.date ? Date.parse(`${item.date}T00:00:00Z`) : NaN;
  const recentCutoff = Date.UTC(2024, 9, 1);
  const isRecent = Number.isFinite(timestamp)
    ? timestamp >= recentCutoff
    : Number(item.year) >= 2025;
  if (!isRecent) return Math.sqrt(plays);
  const year = Number(item.year) || new Date(timestamp).getUTCFullYear() || 2024;
  const yearBoost = 1 + Math.max(0, year - 2024) * 0.18;
  return (280 + Math.log10(plays + 10) * 18) * yearBoost;
}

function naturalNextCandidates() {
  const played = heardIds();
  return LIBRARY.filter(item => {
    return !played.has(item.id)
      && !blocked.has(item.id)
      && !failedThisSession.has(item.id)
      && contentMatches(item)
      && yearMatches(item);
  });
}

function continuityWeight(item, previous) {
  const popularity = selectionBaseWeight(item);
  if (!previous) return popularity;
  const previousTags = new Set(itemTags(previous));
  const sharedTags = itemTags(item).filter(tag => previousTags.has(tag) && !/^m4/i.test(tag)).length;
  const sharedClusters = FILTERS.filter(filter => filterMatches(item, filter) && filterMatches(previous, filter)).length;
  const sameBucket = BUCKET_BY_ID.get(item.id) === BUCKET_BY_ID.get(previous.id);
  return popularity * (1 + sharedTags * 1.25 + sharedClusters * 1.75 + (sameBucket ? 2 : 0));
}

function chooseNext() {
  lastChoiceWasReplay = false;

  if (!fineTuned && history.length) {
    const previous = activeItem();
    const pool = prioritizeRole(naturalNextCandidates());
    const role = preferredRole();
    return weightedPick(pool.map(item => [item, continuityWeight(item, previous) * roleAffinityWeight(item, role)]));
  }

  let pool = baseCandidates();
  pool = prioritizeRole(pool);

  if (!pool.length) {
    pool = baseCandidates({ignoreHistory:true});
    pool = prioritizeRole(pool);
    if (pool.length) lastChoiceWasReplay = true;
  }

  if (!pool.length) return null;
  if (landingWeighted) {
    const role = preferredRole();
    const weighted = pool.map(item => {
      const popularity = selectionBaseWeight(item);
      return [item, popularity * (1 + wantCount(item) * 1.5) * roleAffinityWeight(item, role)];
    });
    return weightedPick(weighted);
  }
  const ranked = pool.map(item => [item, score(item)]).sort((a,b) => b[1] - a[1]);
  return ranked[0][0];
}

function showNext(showOptions = {}) {
  const item = chooseNext();
  return showItem(item, { ...showOptions, replayed: lastChoiceWasReplay });
}

function formatNumber(n) { return Number(n || 0).toLocaleString(); }
function formatClock(seconds) {
  if (!Number.isFinite(seconds) || seconds < 0) return '0:00';
  const whole = Math.floor(seconds);
  const hours = Math.floor(whole / 3600);
  const minutes = Math.floor((whole % 3600) / 60);
  const secs = String(whole % 60).padStart(2, '0');
  return hours ? `${hours}:${String(minutes).padStart(2, '0')}:${secs}` : `${minutes}:${secs}`;
}
function syncTimeline() {
  const duration = Number.isFinite(player.duration) ? player.duration : 0;
  const elapsed = Number.isFinite(player.currentTime) ? player.currentTime : 0;
  const progress = duration ? Math.min(100, (elapsed / duration) * 100) : 0;
  seekBar.value = String(progress);
  seekBar.style.setProperty('--progress', `${progress}%`);
  seekBar.setAttribute('aria-valuetext', `${formatClock(elapsed)} of ${formatClock(duration)}`);
  $('#elapsedTime').textContent = formatClock(elapsed);
  $('#durationTime').textContent = formatClock(duration);
}
function formatMeta(item) {
  const bits = [];
  if (item.plays) bits.push(`${formatNumber(item.plays)} plays`);
  bits.push(item.date_display || 'date unknown');
  return bits.filter(Boolean).join(' · ');
}
function formatTags(item) {
  const tags = (item.tags && item.tags.length) ? item.tags : [item.audience].filter(Boolean);
  if (!tags.length) return '';
  return `<span class="tagIntro">tags:</span> ${tags.join(' · ')}`;
}

async function showItem(item, {autoplay=false, remember=false, replayed=false} = {}) {
  if (!item) { setStatus(fineTuned ? 'nothing' : 'nothing new left'); return; }
  const token = ++changeToken;
  now.classList.add('changing');
  setStatus('');

  queued = item;
  if (autoplay) current = item;
  sourceLink.href = item.source_url || '#';
  sourceLink.hidden = !item.source_url;
  if (!player.src || !player.src.includes(item.audio_url)) {
    player.src = item.audio_url;
    syncTimeline();
  }
  if (remember) addHistory(item);
  renderMemory();

  if (autoplay) {
    player.play().catch(() => setStatus('tap play'));
  }

  await sleep(230);
  if (token !== changeToken) return;

  nowTitle.textContent = item.title;
  nowMeta.textContent = formatMeta(item);
  nowTags.innerHTML = formatTags(item);

  await sleep(50);
  if (token !== changeToken) return;
  now.classList.remove('changing');

  if (replayed) {
    setStatus('you’ve heard everything available — replaying something from before');
  }
}

function addHistory(item) {
  if (!history.length || history[history.length - 1].id !== item.id) {
    history.push({ id: item.id, title: item.title, source_url: item.source_url, at: new Date().toISOString() });
  }
}

function setStatus(msg='') { statusEl.textContent = msg; }
function activeItem() { return current || queued; }

function openRadio() {
  gate.classList.add('gone');
  radio.classList.add('on');
  renderChips();
  showNext({autoplay:true, remember:true});
}

function renderYearChips() {
  const wrap = $('#yearChips');
  if (!wrap) return;
  wrap.innerHTML = '';
  if (!ALL_YEARS.length) {
    const span = document.createElement('span');
    span.className = 'empty';
    span.textContent = 'no dates found';
    wrap.appendChild(span);
    return;
  }
  for (const year of ALL_YEARS) {
    const key = String(year);
    const included = !excludedYears.has(key);
    const btn = document.createElement('button');
    btn.className = `chip year ${included ? 'on' : 'off'}`;
    btn.textContent = key;
    btn.title = included ? `${key} included` : `${key} excluded`;
    btn.addEventListener('click', () => {
      if (excludedYears.has(key)) excludedYears.delete(key);
      else excludedYears.add(key);
      fineTuned = true;
      activeBucket = null;
      saveYears();
      renderYearChips();
      if (!current || player.paused) showNext({autoplay:false, remember:false});
    });
    wrap.appendChild(btn);
  }
}

function renderFilterButtons(containerId, mode) {
  const wrap = $(containerId);
  wrap.innerHTML = '';
  for (const filter of FILTERS) {
    const isOn = mode === 'want' ? wantFilters.has(filter.id) : avoidFilters.has(filter.id);
    const btn = document.createElement('button');
    btn.className = `chip ${mode}${isOn ? ' on' : ''}`;
    btn.textContent = filter.label;
    btn.title = [...(filter.terms || []), ...(filter.exactTags || [])].join(', ');
    btn.addEventListener('click', () => {
      const target = mode === 'want' ? wantFilters : avoidFilters;
      const other = mode === 'want' ? avoidFilters : wantFilters;
      if (target.has(filter.id)) target.delete(filter.id);
      else { target.add(filter.id); other.delete(filter.id); }
      fineTuned = true;
      activeBucket = null;
      renderChips();
    });
    wrap.appendChild(btn);
  }
}
function renderRoleChips() {
  const wrap = $('#roleChips');
  wrap.innerHTML = '';
  const roles = [
    ['submissive', 'mdom'],
    ['dominant', 'msub'],
    ['either', null],
    ['switch', 'switch']
  ];
  for (const [label, value] of roles) {
    const btn = document.createElement('button');
    btn.className = `chip want${roleRequirement === value ? ' on' : ''}`;
    btn.textContent = label;
    btn.addEventListener('click', () => {
      roleRequirement = value;
      fineTuned = true;
      activeBucket = null;
      renderRoleChips();
    });
    wrap.appendChild(btn);
  }
}
function renderChips() {
  renderRoleChips();
  renderYearChips();
  renderFilterButtons('#wantChips', 'want');
  renderFilterButtons('#avoidChips', 'avoid');
}

function renderMemory() {
  $('#historyCount').textContent = history.length ? `(${history.length})` : '';
  historyEl.innerHTML = '';
  if (!history.length) { historyEl.innerHTML = '<li class="empty">empty</li>'; }
  [...history].reverse().forEach(h => {
    const item = LIBRARY.find(x => x.id === h.id);
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.textContent = h.title;
    const actions = document.createElement('span');
    actions.className = 'mini';
    const again = document.createElement('button');
    again.textContent = 'play';
    again.onclick = () => item && showItem(item, {autoplay:true, remember:true});
    const ban = document.createElement('button');
    ban.textContent = 'skip';
    ban.onclick = () => blockItem(h.id);
    actions.append(again, ban);
    li.append(span, actions);
    historyEl.appendChild(li);
  });

  $('#blockedCount').textContent = blocked.size ? `(${blocked.size})` : '';
  blockedEl.innerHTML = '';
  if (!blocked.size) { blockedEl.innerHTML = '<li class="empty">empty</li>'; return; }
  [...blocked].forEach(id => {
    const item = LIBRARY.find(x => x.id === id);
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.textContent = item ? item.title : id;
    const actions = document.createElement('span');
    actions.className = 'mini';
    const undo = document.createElement('button');
    undo.textContent = 'undo';
    undo.onclick = () => { blocked.delete(id); saveBlocked(); renderMemory(); };
    actions.appendChild(undo);
    li.append(span, actions);
    blockedEl.appendChild(li);
  });
}

function blockItem(id) {
  const item = LIBRARY.find(x => x.id === id);
  if (!item) return;
  blocked.add(id);
  saveBlocked();
  if (current && current.id === id) {
    current = null;
    showNext({autoplay:true, remember:true});
  } else {
    showNext({autoplay:false, remember:false});
  }
  renderMemory();
}

$('#playBtn').addEventListener('click', async () => {
  if (!player.paused) {
    player.pause();
    return;
  }
  let replayed = false;
  const item = queued || (() => {
    const picked = chooseNext();
    replayed = lastChoiceWasReplay;
    return picked;
  })();
  if (!item) return setStatus('nothing');
  current = item;
  addHistory(item);
  renderMemory();
  if (replayed) {
    setStatus('you’ve heard everything available — replaying something from before');
  }
  if (player.src && player.src.includes(item.audio_url)) {
    try { await player.play(); } catch (err) { setStatus('tap play'); }
  } else {
    showItem(item, {autoplay:true, remember:true, replayed});
  }
});
$('#nextBtn').addEventListener('click', () => showNext({autoplay:true, remember:true}));
$('#neverBtn').addEventListener('click', () => { const item = activeItem(); if (item) blockItem(item.id); });

$('#fineTuneBtn').addEventListener('click', () => {
  const panel = $('#advanced');
  const opening = panel.hidden;
  panel.hidden = !opening;
  $('#fineTuneBtn').setAttribute('aria-expanded', String(opening));
});

$('#surpriseBtn').addEventListener('click', () => {
  activeBucket = null;
  landingWeighted = true;
  openRadio();
});

player.addEventListener('play', () => {
  if (queued) current = queued;
  $('#playBtn').textContent = 'pause';
  setStatus('');
});
player.addEventListener('pause', () => { $('#playBtn').textContent = 'play'; });
player.addEventListener('timeupdate', syncTimeline);
player.addEventListener('loadedmetadata', syncTimeline);
player.addEventListener('durationchange', syncTimeline);
player.addEventListener('emptied', syncTimeline);
seekBar.addEventListener('input', () => {
  if (!Number.isFinite(player.duration) || player.duration <= 0) return;
  player.currentTime = (Number(seekBar.value) / 100) * player.duration;
  syncTimeline();
});
player.addEventListener('ended', () => showNext({autoplay:true, remember:true}));
player.addEventListener('error', () => {
  const item = activeItem();
  if (item) failedThisSession.add(item.id);
  setStatus('missing');
});

renderQuickChips();
renderMemory();
